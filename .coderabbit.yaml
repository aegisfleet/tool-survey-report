# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "ja-JP"
early_access: true
reviews:
  path_filters:
    - "!_reports/**"
    - "!_trending/**"
  profile: "chill"
  request_changes_workflow: true
  high_level_summary: true
  poem: true
  review_status: true
  review_details: true
  auto_review:
    enabled: true
    drafts: true
chat:
  auto_reply: true
