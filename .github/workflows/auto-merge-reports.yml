name: Auto Merge Reports only PRs

on:
  pull_request_target:
    types: [opened, synchronize, edited, ready_for_review, reopened]
    branches: [main]

permissions:
  contents: write
  actions: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    name: Auto merge reports only PRs by authorized authors
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.user.login == 'google-labs-jules' ||
      github.event.pull_request.user.login == 'google-labs-jules[bot]' ||
      github.event.pull_request.user.login == 'aegisfleet'

    steps:
      - name: Checkout Base (Main)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Checkout PR Head
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: pr-src
          persist-credentials: true

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check and merge reports only PRs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_SRC_PATH: pr-src
        with:
          script: |
            const autoMerge = require('./.github/workflows/scripts/auto-merge.js');
            await autoMerge({ github, context, core });
