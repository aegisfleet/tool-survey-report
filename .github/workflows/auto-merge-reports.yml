name: Auto Merge Reports only PRs

on:
  pull_request:
    types: [opened, synchronize, edited, ready_for_review, reopened]
    branches: [main]

permissions:
  contents: write
  actions: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    name: Auto merge reports only PRs by authorized authors
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@739bfe42ca9233c5e6aca07c1a25a9d34aca49b0 # v6.0.7

      - name: Install js-yaml
        run: pnpm add js-yaml

      - name: Check and merge reports only PRs
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const autoMerge = require('./.github/workflows/scripts/auto-merge.js');
            await autoMerge({ github, context, core });
