name: Generate Daily Trending Topics Report

on:
  schedule:
    # 毎日 日本時間 8:00 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      focus_topic:
        description: '特に注力して調査したいトピックがあれば指定'
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate-trending:
    name: Generate Daily Trending Topics using Jules API
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
      - name: Call Jules API to generate report
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          FOCUS_TOPIC: ${{ github.event.inputs.focus_topic }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // 新しいテンプレートファイルを読み込み
            const templatePath = 'templates/trending_template.md';
            let templateContent = '';
            try {
              templateContent = fs.readFileSync(templatePath, 'utf8');
              core.info(`Trending template loaded: ${templatePath}`);
            } catch (error) {
              core.error(`Failed to load trending template: ${error.message}`);
              process.exit(1);
            }

            const todayJST = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });
            const focusTopic = process.env.FOCUS_TOPIC;

            const promptLines = [
              '# 【最重要】最新情報に基づく深掘りレポート作成指令',
              `本日は **${todayJST}** である。現在のAI・開発ツール業界において、過去24〜48時間以内に発生した極めて鮮度の高い重要なトピックスを網羅的に調査し、合計 **4000文字から7000文字程度** の詳細な日次レポートを作成せよ。`,
              '',
              '## 想定読者',
              'このレポートの読者は多様である。以下のすべての層が価値を感じられるレポートを目指せ。',
              '- **専門家層**: ソフトウェアエンジニア、DevOps担当者、セキュリティエンジニア。正確な技術情報と具体的な対策手順を求めている。',
              '- **一般層**: IT業界のマネージャー、経営者、学生、プログラミング学習者。業界の動向を把握したいが、専門用語には不慣れ。',
              '両者を満足させるために、本レポートでは **「二層構造」** を採用する（後述の執筆ルール参照）。',
              '',
              '## 執筆スタイル：二層構造ルール（厳守）',
              '各セクション・各項目において、以下の二層構造を必ず守ること。',
              '',
              '### 概要層（初学者・一般読者向け）',
              '- セクション1「本日のまとめ」の冒頭には、引用ブロック（`>`）で 💡 **今日のポイント** を3行の箇条書きで配置する。専門用語は使わず、「何が起きたか」「なぜ重要か」を日常の言葉で表現する。',
              '- セクション2〜4の各項目には、必ず **「🔰 ひとことで言うと」** を最初に配置する。これは専門用語を一切使わず、その項目の本質を1行で伝える文である。例: 「このツールを使っているパソコンが、外部から乗っ取られる恐れがあります」',
              '- セクション2の各項目には **「🛡️ まずやるべきこと」** を配置し、非エンジニアでも実行できる具体的なアクションを記載する。例: 「最新版にアップデートしてください」「使用を一時停止してください」',
              '- セクション3の各項目には **「👥 誰に影響があるか」** を配置し、影響を受けるユーザー層を明記する。',
              '- セクション4の各項目には **「💡 こんな人におすすめ」** を配置し、具体的な利用者像を明記する。',
              '- セクション6「総評」の冒頭には、引用ブロック（`>`）で 📌 **今日の一言まとめ** を1〜2行で配置する。',
              '',
              '### 詳細層（専門家向け）',
              '- 概要層の後に、従来と同等以上の技術的詳細を記述する。具体的なバージョン番号、CVE/GHSA番号、対策手順、技術的ブレークスルーの解説などは省略せず正確に書く。',
              '- セキュリティ項目では **「📊 影響の大きさ」** として「影響を受ける人」と「悪用の容易さ」を明記する。',
              '',
              '### 専門用語の取り扱い',
              '- 本文中で初出の専門用語には、カッコ書きで簡潔な補足を添えよ。例: 「RCE（遠隔からコードを実行される攻撃）」「SSRF（サーバーに意図しない通信をさせる攻撃手法）」',
              '- レポート末尾に **「📖 用語解説」セクション** を必ず設け、本日のレポートで使用された専門用語のうち一般読者に馴染みが薄いものを5〜10件、表形式で平易に解説する。例え話や身近な例を積極的に使うこと。',
              '',
              '## レポートの量と質の要求事項',
              '1. **動的なタイトルと説明文の生成（フロントマター）**: **全セクション（セキュリティ、リリース、トレンド）の調査と執筆をすべて完了した後に、その全体の内容を最もよく表すタイトルと説明文を最後にフロントマターに記入せよ。** テンプレートのプレースホルダのままにするのではなく、必ずその日の内容を反映した独自のテキストに変更すること。',
              '   - `title`: 「AIトレンド: [最重要トピック15文字以内]」のような、その日の核心がわかる具体的な見出しにすること。',
              '   - `description`: その日の主要な話題3点を網羅した約100文字程度の具体的な要約にすること。',
              '   - `tags`: セクション2, 3, 4で取り上げた主要なツール名を抽出し、カンマ区切りのリストとして追加せよ（ツール名のみを抽出し、バージョン番号や説明文は含めないこと）。',
              '2. **総文字数**: 日本語で **4000文字以上（7000文字程度を目安とするが、内容に応じて超過しても構わない。7000文字を超えてもユーザー確認を求めずに作業を完遂すること）** とすること。二層構造の採用により従来より情報量が増えるため、文字数の目安を引き上げている。単なる要約ではなく、背景・技術的理由・実務への具体的な影響・移行コストなどを詳細に記述し、専門家が読む価値のある深い内容に仕上げよ。',
              '3. **項目数**: 「緊急セキュリティ情報」「メジャーリリース・新機能」「注目のトレンドツール」の各セクションにおいて、必ず **少なくとも3〜5件ずつの独立したトピックス** をピックアップせよ。',
              '4. **鮮度の厳守**: 2024年や2025年など古い情報の引用は「厳禁」とする。Jules Search機能を活用し、RSS、SNS、テックニュースの最新記事から「今まさに起きていること」を抽出せよ。',
              '5. **ハルシネーション（幻覚）の厳禁**: 実在しないモデル名（例: GPT-4.5-Turbo-Coder）や架空のバージョン番号は絶対に記述しないこと。必ずファクトチェックを行い、現実に発生した事象のみを記載せよ。',
              '6. **一次情報ソースの明記とURLの正確性**: GitHub Advisoryの一般的なページではなく、対象のCVEやGHSAを指す具体的な個別URLを記載すること。また、ツールに関する言及は自身の内部知識に頼らず、必ずツールのAPI（npmやGitHub）を叩き、実在の機能と正確なバージョンを取得して記載すること。',
              '',
              '## 主要調査ソース（必ず参照すること）',
              '- **セキュリティ**: CVE (MITRE), JVN, GitHub Security Advisories, OSV, Mynavi Tech+ (セキュリティカテゴリ)',
              '- **技術ニュース**: Publickey, TechCrunch Japan, ITmedia NEWS, InfoQ Japan, Gihyo.jp',
              '- **トレンド**: Hacker News (Top), GitHub Trending, Reddit (r/programming), Product Hunt, Zenn/Qiita (トレンド項目)',
              '- **公式発表**: OpenAI, Anthropic, Google Cloud Blog, AWS Blog, Azure Blog, Vercel Blog, Meta AI Blog',
              '',
              '## 重点調査対象（例）',
              '1. **セキュリティ**: axiosへのマルウェア混入（サプライチェーン攻撃）のような、著名ライブラリやプラットフォームの脆弱性・侵害情報。',
              '2. **リリース**: LLMモデルの最新アップデート（v4.x, Turbo等）、IDEの新機能一般公開、主要フレームワークの破壊的変更。',
              '3. **トレンド**: 開発効率を劇的に改善する新しいOSSツール、AIエージェントの新しい活用事例、コスト削減手法。',
              '',
              focusTopic ? `## 特別注力トピック\n- ${focusTopic}\n` : '',
              '## 作成指示',
              `1. 作成したレポートは \`_trending/${todayJST}.md\` というファイル名で保存せよ。`,
              '2. リンク切れがないことを \\`scripts/check_links.py\\` で確認せよ。',
              '3. 用語や説明は日本語として自然で読みやすい文体とせよ。概要層では中学生でも理解できる平易さを、詳細層では専門家が信頼できる正確性を、それぞれ両立させよ。',
              '',
              '## レポートテンプレート（厳守）',
              '',
              '```markdown',
              templateContent,
              '```'
            ];

            const prompt = promptLines.join('\n');

            const requestBody = {
              prompt: prompt,
              sourceContext: {
                source: `sources/github/${context.repo.owner}/${context.repo.repo}`,
                githubRepoContext: {
                  startingBranch: "main"
                }
              },
              requirePlanApproval: false,
              automationMode: `AUTO_CREATE_PR`,
              title: `[Daily Topics] ${todayJST}`
            };

            const julesApiUrl = 'https://jules.googleapis.com/v1alpha/sessions';
            const apiKey = process.env.JULES_API_KEY;

            if (!apiKey) {
              core.error('JULES_API_KEY secret is not set');
              process.exit(1);
            }

            try {
              core.info('Calling Jules API...');
              const response = await fetch(julesApiUrl, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'X-Goog-Api-Key': apiKey
                },
                body: JSON.stringify(requestBody)
              });

              if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Jules API call failed: ${response.status} ${response.statusText}\n${errorText}`);
              }

              const result = await response.json();
              core.info(`Jules API session created: ${result.sessionId}`);
            } catch (error) {
              core.error(`Error: ${error.message}`);
              process.exit(1);
            }
