name: Generate Daily Trending Topics Report

on:
  schedule:
    # 毎日 日本時間 8:00 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      focus_topic:
        description: '特に注力して調査したいトピックがあれば指定'
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate-trending:
    name: Generate Daily Trending Topics using Jules API
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
      - name: Call Jules API to generate report
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          FOCUS_TOPIC: ${{ github.event.inputs.focus_topic }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // 新しいテンプレートファイルを読み込み
            const templatePath = 'templates/trending_template.md';
            let templateContent = '';
            try {
              templateContent = fs.readFileSync(templatePath, 'utf8');
              core.info(`Trending template loaded: ${templatePath}`);
            } catch (error) {
              core.error(`Failed to load trending template: ${error.message}`);
              process.exit(1);
            }

            const todayJST = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });
            const focusTopic = process.env.FOCUS_TOPIC;

            const promptLines = [
              '# 【最重要】最新情報に基づく深掘りレポート作成指令',
              `本日は **${todayJST}** である。現在のAI・開発ツール業界において、過去24〜48時間以内に発生した極めて鮮度の高い重要なトピックスを網羅的に調査し、合計 **3000文字から5000文字程度** の詳細な日次レポートを作成せよ。`,
              '',
              '## レポートの量と質の要求事項',
              '1. **総文字数**: 日本語で **3000文字以上 5000文字以内** とすること。単なる要約ではなく、背景・技術的理由・実務への具体的な影響・移行コストなどを詳細に記述し、エンジニアが読む価値のある深い内容に仕上げよ。',
              '2. **項目数**: 「緊急セキュリティ情報」「メジャーリリース・新機能」「注目のトレンドツール」の各セクションにおいて、必ず **少なくとも3〜5件ずつの独立したトピックス** をピックアップせよ。',
              '3. **鮮度の厳守**: 2024年や2025年など古い情報の引用は「厳禁」とする。Jules Search機能を活用し、RSS、SNS、テックニュースの最新記事から「今まさに起きていること」を抽出せよ。',
              '4. **ハルシネーション（幻覚）の厳禁**: 実在しないモデル名（例: GPT-4.5-Turbo-Coder）や架空のバージョン番号は絶対に記述しないこと。必ずファクトチェックを行い、現実に発生した事象のみを記載せよ。',
              '',
              '## 主要調査ソース（必ず参照すること）',
              '- **セキュリティ**: CVE (MITRE), JVN, GitHub Security Advisories, OSV, Mynavi Tech+ (セキュリティカテゴリ)',
              '- **技術ニュース**: Publickey, TechCrunch Japan, ITmedia NEWS, InfoQ Japan, Gihyo.jp',
              '- **トレンド**: Hacker News (Top), GitHub Trending, Reddit (r/programming), Product Hunt, Zenn/Qiita (トレンド項目)',
              '- **公式発表**: OpenAI, Anthropic, Google Cloud Blog, AWS Blog, Azure Blog, Vercel Blog, Meta AI Blog',
              '',
              '## 重点調査対象（例）',
              '1. **セキュリティ**: axiosへのマルウェア混入（サプライチェーン攻撃）のような、著名ライブラリやプラットフォームの脆弱性・侵害情報。',
              '2. **リリース**: LLMモデルの最新アップデート（v4.x, Turbo等）、IDEの新機能一般公開、主要フレームワークの破壊的変更。',
              '3. **トレンド**: 開発効率を劇的に改善する新しいOSSツール、AIエージェントの新しい活用事例、コスト削減手法。',
              '',
              focusTopic ? `## 特別注力トピック\n- ${focusTopic}\n` : '',
              '## 作成指示',
              `1. 作成したレポートは \`_trending/${todayJST}.md\` というファイル名で保存せよ。`,
              '2. リンク切れがないことを \`scripts/check_links.py\` で確認せよ。',
              '3. 用語や説明は日本語として自然で、かつプロフェッショナルなエンジニアが読むに値する技術レベルを維持せよ。',
              '',
              '## レポートテンプレート（厳守）',
              '',
              '```markdown',
              templateContent,
              '```'
            ];

            const prompt = promptLines.join('\n');

            const requestBody = {
              prompt: prompt,
              sourceContext: {
                source: `sources/github/${context.repo.owner}/${context.repo.repo}`,
                githubRepoContext: {
                  startingBranch: "main"
                }
              },
              requirePlanApproval: false,
              automationMode: `AUTO_CREATE_PR`,
              title: `[Daily Topics] ${todayJST}`
            };

            const julesApiUrl = 'https://jules.googleapis.com/v1alpha/sessions';
            const apiKey = process.env.JULES_API_KEY;

            if (!apiKey) {
              core.error('JULES_API_KEY secret is not set');
              process.exit(1);
            }

            try {
              core.info('Calling Jules API...');
              const response = await fetch(julesApiUrl, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'X-Goog-Api-Key': apiKey
                },
                body: JSON.stringify(requestBody)
              });

              if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Jules API call failed: ${response.status} ${response.statusText}\n${errorText}`);
              }

              const result = await response.json();
              core.info(`Jules API session created: ${result.sessionId}`);
            } catch (error) {
              core.error(`Error: ${error.message}`);
              process.exit(1);
            }
