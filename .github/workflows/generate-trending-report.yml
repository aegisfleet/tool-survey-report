name: Generate Daily Trending Topics Report

on:
  schedule:
    # 毎日 日本時間 8:00 (UTC 23:00)
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      focus_topic:
        description: '特に注力して調査したいトピックがあれば指定'
        required: false
        type: string

permissions:
  contents: read

jobs:
  generate-trending:
    name: Generate Daily Trending Topics using Jules API
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        
      - name: Call Jules API to generate report
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
          FOCUS_TOPIC: ${{ github.event.inputs.focus_topic }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // 新しいテンプレートファイルを読み込み
            const templatePath = 'templates/trending_template.md';
            let templateContent = '';
            try {
              templateContent = fs.readFileSync(templatePath, 'utf8');
              core.info(`Trending template loaded: ${templatePath}`);
            } catch (error) {
              core.error(`Failed to load trending template: ${error.message}`);
              process.exit(1);
            }

            const todayJST = new Date().toLocaleDateString('sv-SE', { timeZone: 'Asia/Tokyo' });
            const focusTopic = process.env.FOCUS_TOPIC;

            const promptLines = [
              '# 重要: 2026年最新情報の徹底調査',
              `本日は **2026年4月4日** である。現在のAI・開発ツール業界において「過去24〜48時間以内に発生した」極めて鮮度の高い重要なトピックスを調査し、\`templates/trending_template.md\` の形式でレポートを作成せよ。`,
              '',
              '## 厳守事項',
              '1. **古い情報の排除**: 2024年や2025年の古いトピック（例: Ollama CVE-2024-37032, GitHub Copilot Workspace preview 等）は「絶対に」含めない。',
              '2. **情報の鮮度**: 原則として「今日」または「昨日」のニュースを優先する。',
              '3. **実在する事件・リリースの特定**: ネット上の信頼できるソース（GitHub Trending, Hacker News, Mynavi Tech+, TechCrunch, 各ツール公式のX/ブログ）から、具体的な事実を抽出する。',
              '',
              '## 重点調査対象・例',
              '以下の3つのセクションを、エンジニアが実務で「今日知っておくべき」レベルの具体性で記述せよ：',
              '1. **緊急セキュリティ・リスク (Security Alerts)**',
              '   - 例: メジャーライブラリ（axios等）へのマルウェア混入、npm/PyPIのサプライチェーン攻撃、著名ツールの認証不備など。',
              '   - 開発環境への影響や、緊急の対策（バージョン固定など）を具体的に。',
              '2. **メジャーリリース・新機能 (Major Releases)**',
              '   - 注目ツールの最新バージョン（v5.0, v2.0等）や、既存ワークフローを破壊・改善する新機能の一般公開。',
              '3. **最新トレンド (Trending Tools)**',
              '   - GitHub Trending で急上昇しているOSS、SNSで実用性が議論されている新しいツール。',
              '',
              focusTopic ? `## 特別注力トピック\n- ${focusTopic}\n` : '',
              '## 指示事項',
              `1. 作成したレポートは \`_trending/${todayJST}.md\` というファイル名で保存する。`,
              '2. 合計で少なくとも 3〜5 件のトピックスを含める。',
              '3. 出典となるURLは、2026年4月周辺の有効なリンクであることを確認する。',
              `4. 作業完了後、必ず \`python3 scripts/check_links.py _trending/${todayJST}.md --browser\` を実行してリンク切れがないか確認する。`,
              '',
              '## レポートテンプレート（厳守）',
              '',
              '```markdown',
              templateContent,
              '```'
            ];

            const prompt = promptLines.join('\n');

            const requestBody = {
              prompt: prompt,
              sourceContext: {
                source: `sources/github/${context.repo.owner}/${context.repo.repo}`,
                githubRepoContext: {
                  startingBranch: "main"
                }
              },
              requirePlanApproval: false,
              automationMode: `AUTO_CREATE_PR`,
              title: `[Daily Topics] ${todayJST}`
            };

            const julesApiUrl = 'https://jules.googleapis.com/v1alpha/sessions';
            const apiKey = process.env.JULES_API_KEY;

            if (!apiKey) {
              core.error('JULES_API_KEY secret is not set');
              process.exit(1);
            }

            try {
              core.info('Calling Jules API...');
              const response = await fetch(julesApiUrl, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'X-Goog-Api-Key': apiKey
                },
                body: JSON.stringify(requestBody)
              });

              if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`Jules API call failed: ${response.status} ${response.statusText}\n${errorText}`);
              }

              const result = await response.json();
              core.info(`Jules API session created: ${result.sessionId}`);
            } catch (error) {
              core.error(`Error: ${error.message}`);
              process.exit(1);
            }
