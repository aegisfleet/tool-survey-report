name: Test
permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'assets/js/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'assets/js/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test.yml'

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5.3.0 # v5.3.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          uv sync --locked

      - name: Install Playwright Browsers
        run: uv run playwright install --with-deps chromium

      - name: Run Python tests
        run: uv run python3 -m unittest discover tests/scripts
        env:
          TESTING: '1'
          PYTHONPATH: .

  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run JavaScript tests
        run: |
          node tests/js/test_emoji_logic.js
          node tests/js/test_home_logic.js
          node tests/js/test_workflow_security.js
