name: Test
permissions:
  contents: read

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'assets/js/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'assets/js/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/test.yml'

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          python-version: '3.11'

      - name: Install dependencies
        run: |
          uv sync --locked

      - name: Install Playwright Browsers
        run: uv run playwright install --with-deps chromium

      - name: Run Python tests
        run: uv run python3 -m unittest discover tests/scripts
        env:
          TESTING: '1'
          PYTHONPATH: .

  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run JavaScript tests
        run: |
          node tests/js/test_emoji_logic.js
          node tests/js/test_home_logic.js
          node tests/js/test_workflow_security.js
