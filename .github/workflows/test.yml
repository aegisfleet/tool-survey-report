name: Test

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'assets/js/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'tests/**'
      - 'assets/js/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/test.yml'

jobs:
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyyaml

      - name: Install Playwright Browsers
        run: playwright install --with-deps chromium

      - name: Run Python tests
        run: python3 -m unittest discover tests/scripts
        env:
          TESTING: '1'

  node-tests:
    name: Node.js Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run JavaScript tests
        run: |
          node tests/js/test_emoji_logic.js
          node tests/js/test_home_logic.js
          node tests/js/test_workflow_security.js
